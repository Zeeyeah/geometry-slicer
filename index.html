<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="src/styles/style.css" />
		<title>Geometry Slicer</title>
	</head>
	<body>
		<div class="menu-overlay">
			<h2>Geometry Slicer</h2>
			<div>
				<p>Select a model</p>
			<div class="model-selector">
				<div class="model-card">
					<img src="/public/Suzzane.png" />
				</div>
				<div class="model-card">
										<img src="/public/Cube.png" />

				</div>
				<div class="model-card">
										<img src="/public/Torus.png" />

				</div>
			</div>
			</div>
			
			OR
			<div class="import-model">
				<input
					id="model-upload"
					type="file"
					accept=".glb,.gltf"
					hidden
				/>

				<label for="model-upload" class="dropzone">
					        <div class="dropzone-content">
            <p class="upload-title">Drag & Drop GLTF/GLB</p>
            <span class="upload-subtitle">
                or click to browse
            </span>
        </div>
				</label>
			</div>
			<button disabled class="start-button">Start</button>
		</div>
		<div class="canvas-bg"></div>
		<canvas id="webgl"></canvas>
		<div class="ui-overlay">
	<div class="top-bar">
	<select class="model-select">
		<option value="" disabled selected>Select a model</option>
		<option value="suzanne">Suzanne</option>
		<option value="cube">Cube</option>
		<option value="torus">Torus</option>
	</select>

	<span>OR</span>

	<input
		id="model-upload"
		type="file"
		accept=".glb,.gltf"
	/>
</div>

	<div class="bottom-bar">
		<button class="tool-btn drag-btn active">Drag</button>
		<button class="tool-btn cut-btn">Cut</button>
		<button class="tool-btn reset-btn">Reset</button>
	</div>
</div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
